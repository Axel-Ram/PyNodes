<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PyNodes</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.css">
    <script src="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="icon.png">

        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-DF39WDQN0Y');

    <meta name="description" content="Herramienta basada en nodos para crear guiones de Ren'Py Facilmente">
    <meta name="keywords" content="Renpy, Ren'Py, Visual Novel, Tool, Renpy Tool, Renpy Script Editor">

    <meta property="og:image" content="https://raw.githubusercontent.com/Axel-Ram/PyNodes/refs/heads/main/thumbnail.jpg">
    <meta property="og:url" content="https://axel-ram.github.io/PyNodes/">

    <style>
        /* ── Layout general ── */
        .main-container {
            display: flex;
            height: calc(100vh - 60px);
        }

        /* ── Sidebar izquierda ── */
        .sidebar {
            width: 200px;
            background: #111;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-shrink: 0;
        }

        .sidebar-section {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 8px 0 2px;
        }

        .drag-item {
            padding: 10px;
            background: #444;
            color: white;
            cursor: move;
            border-radius: 4px;
            text-align: center;
            user-select: none;
            font-size: 13px;
        }
        .drag-item:hover { background: #555; }

        /* ── Canvas ── */
        #drawflow {
            flex-grow: 1;
            transition: all 0.3s ease;
        }

        /* ── Panel de previsualización ── */
        #preview-panel {
            width: 0;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: width 0.3s ease;
            flex-shrink: 0;
            border-left: 1px solid #333;
        }
        #preview-panel.open {
            width: 360px;
        }

        .preview-toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px;
            background: #111;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }
        .preview-toolbar span {
            color: #aaa;
            font-size: 13px;
            font-weight: bold;
            flex-grow: 1;
        }
        .preview-toolbar button {
            padding: 6px 10px;
            font-size: 12px;
        }

        #preview-code {
            flex-grow: 1;
            background: transparent;
            color: #d4d4d4;
            font-family: monospace;
            font-size: 12px;
            line-height: 1.6;
            padding: 14px;
            border: none;
            resize: none;
            outline: none;
            overflow-y: auto;
            white-space: pre;
        }

        /* ── Botones del toolbar principal ── */
        .toolbar-btn {
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }

        /* ── Nodos: estilos compartidos ── */
        .node-container { min-width: 200px; }

        .node-header {
            padding: 6px 10px;
            border-radius: 4px 4px 0 0;
            font-size: 12px;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Colores de headers por tipo */
        .char-header  { background: #9b59b6; }
        .dial-header  { background: #3498db; }
        .show-header  { background: #27ae60; }
        .scene-header { background: #e67e22; }
        .play-header  { background: #e91e8c; }
        .code-header  { background: #555;    }

        .node-content {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            color: white;
            font-size: 13px;
        }

        .node-content input,
        .node-content select,
        .node-content textarea {
            background: #1a1a1a;
            border: 1px solid #555;
            color: white;
            padding: 5px;
            border-radius: 4px;
            font-size: 12px;
        }

        textarea { height: 70px; resize: none; }
        .code-node textarea { font-family: monospace; height: 110px; }

        /* ── Botón de bloquear ID ── */
        .lock-btn {
            padding: 3px 8px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            background: #27ae60;
            color: white;
            align-self: flex-start;
        }
        .lock-btn.locked { background: #c0392b; }

        /* ── Botón de minimizar nodo personaje ── */
        .minimize-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            font-size: 14px;
            padding: 0 2px;
            line-height: 1;
        }
        .minimize-btn:hover { color: white; }

        /* Contenido del nodo cuando está minimizado */
        .node-content.collapsed { display: none; }

        /* Etiqueta que se muestra cuando el nodo está minimizado */
        .char-mini-label {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            padding: 3px 10px 6px;
            font-style: italic;
        }

        /* ── Nodo menú ── */
        .menu-header { background: #c0392b; }
        .menu-option {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 4px;
        }
        .menu-option input { flex-grow: 1; }
        .menu-option-label {
            font-size: 10px;
            color: #888;
            min-width: 18px;
            text-align: right;
        }
        .menu-add-btn {
            padding: 4px 8px;
            background: #444;
            border: 1px solid #666;
            color: #ccc;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            width: 100%;
            text-align: center;
        }
        .menu-add-btn:hover { background: #555; color: white; }
        .menu-remove-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 14px;
            padding: 0 2px;
            line-height: 1;
            flex-shrink: 0;
        }
        .menu-remove-btn:hover { color: #e74c3c; }

        /* ── Nodo Label ── */
        .label-header   { background: #1a6b3a; }
        .label-node { border: 1px solid #1a6b3a !important; }
        .label-name {
            font-size: 13px;
            font-weight: bold;
            color: #2ecc71;
            padding: 4px 10px 6px;
            font-family: monospace;
        }

        /* ── Nodo Jump ── */
        .jump-header  { background: #16697a; }

        /* ── Nodo Variable ── */
        .var-header   { background: #7d5a00; }
    </style>
</head>
<body>

<div class="toolbar">
    <h2 style="color:white;margin:0;font-size:18px;margin-right:20px;">PyNodes</h2>
    <button class="toolbar-btn" onclick="togglePreview()" style="background:#2980b9;">👁 Vista previa</button>
    <button class="toolbar-btn" onclick="exportCanvas()" style="background:#27ae60;" title="Descarga el canvas como archivo .json para importarlo después">💾 Guardar canvas</button>
    <button class="toolbar-btn" onclick="document.getElementById('import-input').click()" style="background:#8e44ad;" title="Carga un canvas guardado anteriormente">📂 Cargar canvas</button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importCanvas(event)">
    <button class="toolbar-btn" onclick="clearCanvas()" style="background:#555;">🗑 Limpiar</button>
    <span id="save-indicator" style="color:#555;font-size:11px;margin-left:auto;font-style:italic;">sesión guardada automáticamente</span>
</div>

<div class="main-container">

    <div class="sidebar">
        <div class="sidebar-section">Personajes</div>
        <div class="drag-item" draggable="true" ondragstart="drag(event)" data-node="character" style="background-color: #9B59B6;">👤 Personaje</div>

        <div class="sidebar-section">Escena</div>
        <div class="drag-item" draggable="true" ondragstart="drag(event)" data-node="scene" style="background-color: #E67E22;">🖼 Scene</div>
        <div class="drag-item" draggable="true" ondragstart="drag(event)" data-node="showHide" style="background-color: #27AE60;">🎭 Show / Hide</div>

        <div class="sidebar-section">Audio</div>
        <div class="drag-item" draggable="true" ondragstart="drag(event)" data-node="playStop" style="background-color: #E91E8C;">🎵 Play / Stop</div>

        <div class="sidebar-section">Narrativa</div>
        <div class="drag-item" draggable="true" ondragstart="drag(event)" data-node="dialog" style="background-color: #3498DB;">💬 Diálogo</div>
        <div class="drag-item" draggable="true" ondragstart="drag(event)" data-node="menu" style="background-color: #C0392B;">🔀 Menú</div>

        <div class="sidebar-section">Control de flujo</div>
        <div class="drag-item" draggable="true" ondragstart="drag(event)" data-node="label" style="background-color: #1a6b3a;">🏷 Label</div>
        <div class="drag-item" draggable="true" ondragstart="drag(event)" data-node="jump" style="background-color: #16697a;">↪ Jump</div>
        <div class="drag-item" draggable="true" ondragstart="drag(event)" data-node="variable" style="background-color: #7d5a00;">📦 Variable</div>

        <div class="sidebar-section">Avanzado</div>
        <div class="drag-item" draggable="true" ondragstart="drag(event)" data-node="code">📝 Código</div>
    </div>

    <div id="drawflow" ondrop="drop(event)" ondragover="allowDrop(event)"></div>

    <div id="preview-panel">
        <div class="preview-toolbar">
            <span>📄 script.rpy</span>
            <button class="toolbar-btn" onclick="copyPreview(this)" style="background:#2980b9;" title="Copiar al portapapeles">📋 Copiar</button>
            <button class="toolbar-btn" onclick="downloadRenPyScript()" style="background:#e67e22;" title="Descargar archivo">⬇</button>
            <button class="toolbar-btn" onclick="togglePreview()" style="background:#444;" title="Cerrar">✕</button>
        </div>
        <textarea id="preview-code" readonly></textarea>
    </div>

</div>

<script>
    // ─────────────────────────────────────────────
    // INICIALIZACIÓN
    // ─────────────────────────────────────────────

    const container = document.getElementById("drawflow");
    const editor    = new Drawflow(container);
    editor.start();

    let characters  = [];
    let previewOpen = false;

    // Almacén propio para datos de personajes, independiente de Drawflow.
    const characterData = {};

    // Nodo copiado para Ctrl+C / Ctrl+V
    let copiedNodeData = null;

    // Devuelve el ID del nodo actualmente seleccionado en el canvas,
    // leyendo directamente del DOM porque editor.node_selected no es confiable.
    function getSelectedNodeId() {
        const el = container.querySelector('.drawflow-node.selected');
        if (!el) return null;
        return parseInt(el.id.replace('node-', ''));
    }

    // ── Eventos de Drawflow ──
    editor.on('connectionCreated', () => { saveSession(); refreshPreview(); });
    editor.on('connectionRemoved', () => { saveSession(); refreshPreview(); });
    editor.on('nodeRemoved',       (id) => { delete characterData[id]; saveSession(); refreshPreview(); });
    editor.on('nodeMoved',         () => saveSession());

    // Snapshot inicial (para que el primer Ctrl+Z pueda volver al estado vacío)
    setTimeout(() => captureSnapshot(), 200);

    // ── Teclado ──
    document.addEventListener('keydown', (ev) => {
        const tag = document.activeElement?.tagName;
        const inField = tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA';

        // Delete / Backspace — borrar nodo o conexión seleccionada
        if ((ev.key === 'Delete' || ev.key === 'Backspace') && !inField) {
            ev.preventDefault();
            const selConn = container.querySelector('.connection.selected');
            if (selConn) {
                deleteSelectedConnection(selConn);
            } else {
                const nodeId = getSelectedNodeId();
                if (nodeId) editor.removeNodeId(`node-${nodeId}`);
            }
            return;
        }

        // Ctrl+Z — deshacer
        if (ev.key === 'z' && (ev.ctrlKey || ev.metaKey) && !ev.shiftKey && !inField) {
            ev.preventDefault();
            undo();
            return;
        }

        // Ctrl+Y / Ctrl+Shift+Z — rehacer
        if ((ev.key === 'y' && (ev.ctrlKey || ev.metaKey) && !inField) ||
            (ev.key === 'z' && (ev.ctrlKey || ev.metaKey) && ev.shiftKey && !inField)) {
            ev.preventDefault();
            redo();
            return;
        }

        // Ctrl+C — copiar nodo seleccionado
        if (ev.key === 'c' && (ev.ctrlKey || ev.metaKey) && !inField) {
            ev.preventDefault();
            const nodeId = getSelectedNodeId();
            if (!nodeId) return;

            const nodes = editor.export().drawflow.Home.data;
            const node  = nodes[nodeId];
            if (!node) return;

            copiedNodeData = {
                name:      node.name,
                domValues: captureDomValues(nodeId),
                charData:  characterData[nodeId] ? { ...characterData[nodeId] } : null,
                menuCount: menuOptionCount[nodeId] || null,
            };

            // Feedback visual: parpadeo del nodo
            const nodeEl = document.querySelector(`#node-${nodeId}`);
            if (nodeEl) {
                nodeEl.style.outline = '2px solid #27ae60';
                setTimeout(() => nodeEl.style.outline = '', 400);
            }
            return;
        }

        // Ctrl+V — pegar nodo copiado
        if (ev.key === 'v' && (ev.ctrlKey || ev.metaKey) && !inField) {
            ev.preventDefault();
            if (!copiedNodeData) return;
            pasteNode(copiedNodeData);
            return;
        }
    });

    // Captura los valores actuales de los inputs df-* de un nodo directamente del DOM
    function captureDomValues(nodeId) {
        const nodeEl = document.querySelector(`#node-${nodeId}`);
        if (!nodeEl) return {};
        const values = {};
        nodeEl.querySelectorAll('[df-id],[df-name],[df-color],[df-char_id],[df-text],[df-action],[df-sprite],[df-position],[df-transition],[df-background],[df-filepath],[df-channel],[df-loop],[df-code]').forEach(el => {
            const attr = Array.from(el.attributes).find(a => a.name.startsWith('df-'));
            if (attr) values[attr.name] = el.type === 'checkbox' ? el.checked : el.value;
        });
        // Para menú, capturamos los textos de las opciones
        nodeEl.querySelectorAll('.menu-option input').forEach((inp, i) => {
            values[`menu-option-${i}`] = inp.value;
        });
        return values;
    }

    // Pega un nodo copiado centrado en la posición actual del mouse
    function pasteNode(data) {
        // Creamos el nodo primero en la posición del mouse
        const pos_x = lastMouseCanvasX;
        const pos_y = lastMouseCanvasY;

        let newId;
        if (data.name === 'character_def') newId = addCharacterDefinition(pos_x, pos_y);
        if (data.name === 'dialog')        newId = addDialogue(pos_x, pos_y);
        if (data.name === 'showHide')      newId = addShowHide(pos_x, pos_y);
        if (data.name === 'scene')         newId = addScene(pos_x, pos_y);
        if (data.name === 'playStop')      newId = addPlayStop(pos_x, pos_y);
        if (data.name === 'code')          newId = addCode(pos_x, pos_y);
        if (data.name === 'menu')          newId = addMenu(pos_x, pos_y);
        if (data.name === 'label')         newId = addLabel(pos_x, pos_y);
        if (data.name === 'jump')          newId = addJump(pos_x, pos_y);
        if (data.name === 'variable')      newId = addVariable(pos_x, pos_y);
        if (!newId) return;

        setTimeout(() => {
            const nodeEl = document.querySelector(`#node-${newId}`);
            if (!nodeEl) return;

            // Centramos el nodo en el cursor igual que al arrastrar
            const centeredX = pos_x - nodeEl.offsetWidth  / 2;
            const centeredY = pos_y - nodeEl.offsetHeight / 2;
            editor.drawflow.drawflow.Home.data[newId].pos_x = centeredX;
            editor.drawflow.drawflow.Home.data[newId].pos_y = centeredY;
            nodeEl.style.left = centeredX + "px";
            nodeEl.style.top  = centeredY + "px";

            // Restaurar inputs df-*
            Object.entries(data.domValues).forEach(([attr, value]) => {
                if (attr.startsWith('menu-option-')) return;
                const el = nodeEl.querySelector(`[${attr}]`);
                if (!el) return;
                if (el.type === 'checkbox') el.checked = value;
                else el.value = value;
                el.dispatchEvent(new Event('change'));
            });

            // Restaurar opciones del menú
            if (data.name === 'menu') {
                const list = nodeEl.querySelector('.menu-options-list');
                if (list) {
                    list.querySelectorAll('.menu-option input').forEach((inp, i) => {
                        const saved = data.domValues[`menu-option-${i}`];
                        if (saved !== undefined) inp.value = saved;
                    });
                }
            }

            // Restaurar characterData si es un personaje
            if (data.charData) {
                characterData[newId] = { ...data.charData, locked: false };
                rebuildCharacters();
            }

            saveSession();
            refreshPreview();
        }, 50);
    }

    // ── Doble click en conexión: borrarla ──
    container.addEventListener('dblclick', (ev) => {
        const path = ev.target.closest('.main-path');
        if (!path) return;
        const connSvg = path.closest('svg.connection');
        if (connSvg) deleteSelectedConnection(connSvg);
    });

    // Borra una conexión a partir del elemento SVG que la representa.
    // Drawflow guarda los datos de la conexión en las clases CSS del SVG:
    // node_out_node-X, node_in_node-Y, output_N, input_N
    function deleteSelectedConnection(connEl) {
        const classes = Array.from(connEl.classList);
        let fromId, toId, fromOutput, toInput;
        classes.forEach(c => {
            if (c.startsWith('node_out_node-')) fromId     = c.replace('node_out_node-', '');
            if (c.startsWith('node_in_node-'))  toId       = c.replace('node_in_node-', '');
            if (c.startsWith('output_'))        fromOutput = c;
            if (c.startsWith('input_'))         toInput    = c;
        });
        if (fromId && toId && fromOutput && toInput) {
            editor.removeSingleConnection(fromId, toId, fromOutput, toInput);
        }
    }

    // ── Autoguardado en localStorage ──

    // Guarda el estado actual del canvas + characterData en localStorage.
    // Se llama en cada cambio relevante con un pequeño debounce.
    let saveTimer = null;
    function saveSession() {
        // Mostramos que hay cambios sin guardar
        const indicator = document.getElementById('save-indicator');
        if (indicator) { indicator.style.color = '#e67e22'; indicator.textContent = '● cambios sin guardar'; }

        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {
            try {
                const state = {
                    drawflow: editor.export(),
                    characterData: characterData,
                    menuOptionCount: menuOptionCount,
                };
                localStorage.setItem('renpy_session', JSON.stringify(state));
                if (indicator) { indicator.style.color = '#555'; indicator.textContent = '✓ sesión guardada'; }
            } catch (e) {
                console.warn('No se pudo guardar la sesión:', e);
                if (indicator) { indicator.style.color = '#e74c3c'; indicator.textContent = '⚠ error al guardar'; }
            }
        }, 500);
    }

    // Restaura el estado guardado al cargar la página.
    // Los nodos se reconstruyen a través de editor.import() pero los
    // datos extra (characterData, menuOptionCount, valores DOM) los restauramos a mano.
    function loadSession() {
        const raw = localStorage.getItem('renpy_session');
        if (!raw) return;

        try {
            const state = JSON.parse(raw);

            // Restauramos characterData y menuOptionCount primero
            if (state.characterData) {
                Object.entries(state.characterData).forEach(([k, v]) => {
                    characterData[k] = v;
                });
            }
            if (state.menuOptionCount) {
                Object.entries(state.menuOptionCount).forEach(([k, v]) => {
                    menuOptionCount[k] = v;
                });
            }

            // Importamos el canvas — esto recrea los nodos en el DOM
            if (state.drawflow) {
                editor.import(state.drawflow);
            }

            // Después de que Drawflow renderice los nodos, reconstruimos los personajes
            // y restauramos los colores de header y estados de lock que no persisten en el HTML
            setTimeout(() => {
                rebuildCharacters();
                refreshPreview();

                // Restaurar el color del header de cada nodo de personaje
                // y el estado de bloqueo del ID
                Object.entries(characterData).forEach(([nodeId, data]) => {
                    const nodeEl = document.querySelector(`#node-${nodeId}`);
                    if (!nodeEl) return;

                    // Restaurar color del header
                    const header = nodeEl.querySelector('.char-header');
                    if (header && data.color && data.color !== '#ffffff') {
                        header.style.background = data.color;
                        header.style.color = getTextColor(data.color);
                    }

                    // Restaurar estado del campo ID (readonly si ya tiene valor)
                    const idInput = nodeEl.querySelector('[df-id]');
                    if (idInput && data.id) {
                        idInput.value    = data.id;
                        idInput.readOnly = true;
                        idInput.style.opacity = '0.6';
                        idInput.title = 'El ID no se puede cambiar una vez definido';
                    }

                    // Restaurar nombre y color en los inputs
                    const nameInput  = nodeEl.querySelector('[df-name]');
                    const colorInput = nodeEl.querySelector('[df-color]');
                    if (nameInput)  nameInput.value  = data.name  || '';
                    if (colorInput) colorInput.value = data.color || '#ffffff';
                });
            }, 100);

        } catch (e) {
            console.warn('No se pudo restaurar la sesión:', e);
        }
    }

    // Intentamos cargar la sesión anterior al iniciar
    loadSession();

    // ── Guardado automático en cualquier edición de nodo ──
    // En lugar de añadir saveSession() a cada oninput/onchange individualmente,
    // escuchamos los eventos en el canvas con debounce. Esto cubre todos los nodos.
    container.addEventListener('input',  () => saveSession());
    container.addEventListener('change', () => saveSession());

    // ── Rastreo de posición del mouse en el canvas ──
    // Lo usamos para pegar nodos exactamente donde está el cursor (Ctrl+V)
    let lastMouseCanvasX = 300;
    let lastMouseCanvasY = 200;
    container.addEventListener('mousemove', (ev) => {
        const rect = container.getBoundingClientRect();
        lastMouseCanvasX = (ev.clientX - rect.left - editor.canvas_x) / editor.zoom;
        lastMouseCanvasY = (ev.clientY - rect.top  - editor.canvas_y) / editor.zoom;
    });


    // ─────────────────────────────────────────────
    // DRAG & DROP
    // ─────────────────────────────────────────────

    function allowDrop(ev) { ev.preventDefault(); }

    function drag(ev) {
        ev.dataTransfer.setData("node", ev.target.getAttribute('data-node'));
    }

    function drop(ev) {
        ev.preventDefault();

        const nodeType   = ev.dataTransfer.getData("node");
        const canvasRect = container.getBoundingClientRect();

        const pos_x = (ev.clientX - canvasRect.left - editor.canvas_x) / editor.zoom;
        const pos_y = (ev.clientY - canvasRect.top  - editor.canvas_y) / editor.zoom;

        // NUEVO: Verificamos si se soltó exactamente sobre la línea SVG de una conexión
        let droppedOnPath = null;
        if (ev.target.classList.contains('main-path')) {
            droppedOnPath = ev.target;
        }

        let nodeId;
        if (nodeType === 'character') nodeId = addCharacterDefinition(pos_x, pos_y);
        if (nodeType === 'dialog')    nodeId = addDialogue(pos_x, pos_y);
        if (nodeType === 'showHide')  nodeId = addShowHide(pos_x, pos_y);
        if (nodeType === 'scene')     nodeId = addScene(pos_x, pos_y);
        if (nodeType === 'playStop')  nodeId = addPlayStop(pos_x, pos_y);
        if (nodeType === 'code')      nodeId = addCode(pos_x, pos_y);
        if (nodeType === 'menu')      nodeId = addMenu(pos_x, pos_y);
        if (nodeType === 'label')     nodeId = addLabel(pos_x, pos_y);
        if (nodeType === 'jump')      nodeId = addJump(pos_x, pos_y);
        if (nodeType === 'variable')  nodeId = addVariable(pos_x, pos_y);

        const isScriptNode = nodeType !== 'character';

        setTimeout(() => {
            const nodeEl = document.querySelector(`#node-${nodeId}`);
            if (!nodeEl) return;

            // Centramos el nodo en el cursor (igual que el drag original)
            const centeredX = pos_x - nodeEl.offsetWidth  / 2;
            const centeredY = pos_y - nodeEl.offsetHeight / 2;

            editor.drawflow.drawflow.Home.data[nodeId].pos_x = centeredX;
            editor.drawflow.drawflow.Home.data[nodeId].pos_y = centeredY;
            nodeEl.style.left = centeredX + "px";
            nodeEl.style.top  = centeredY + "px";

            if (isScriptNode) {
                if (droppedOnPath) {
                    insertNodeInPath(nodeId.toString(), droppedOnPath);
                } else {
                    tryInsertBetween(nodeId.toString(), pos_x, pos_y);
                }
            }
        }, 0);
    }

    // NUEVO: Extrae los datos exactos de la conexión interceptando las clases del SVG
    function insertNodeInPath(newIdStr, pathEl) {
        const svg = pathEl.closest('svg.connection');
        if (!svg) return;

        const classes = Array.from(svg.classList);
        let toId, fromId, fromOutput, toInput;

        classes.forEach(c => {
            if (c.startsWith('node_in_node-')) toId = c.replace('node_in_node-', '');
            if (c.startsWith('node_out_node-')) fromId = c.replace('node_out_node-', '');
            if (c.startsWith('output_')) fromOutput = c;
            if (c.startsWith('input_')) toInput = c;
        });

        if (fromId && toId && fromOutput && toInput) {
            editor.removeSingleConnection(fromId, toId, fromOutput, toInput);
            editor.addConnection(fromId, newIdStr, fromOutput, 'input_1');
            editor.addConnection(newIdStr, toId, 'output_1', toInput);
            refreshPreview();
        }
    }

    // CORREGIDO: Fuerza a que los IDs sean Strings para que la API de Drawflow no colapse
    function tryInsertBetween(newNodeIdStr, dropX, dropY) {
        const nodes = editor.export().drawflow.Home.data;
        const THRESHOLD = 80; // Margen más permisivo para las curvas

        let bestDist = THRESHOLD;
        let bestConn = null;

        Object.entries(nodes).forEach(([fromIdStr, fromNode]) => {
            if (fromIdStr === newNodeIdStr) return;

            Object.entries(fromNode.outputs || {}).forEach(([outputKey, output]) => {
                (output.connections || []).forEach(conn => {
                    const toIdStr = String(conn.node);
                    if (toIdStr === newNodeIdStr) return;

                    const toNode = nodes[toIdStr];
                    if (!toNode) return;

                    const fromEl = document.querySelector(`#node-${fromIdStr}`);
                    const toEl   = document.querySelector(`#node-${toIdStr}`);
                    if (!fromEl || !toEl) return;

                    const x1 = fromNode.pos_x + fromEl.offsetWidth;
                    const y1 = fromNode.pos_y + fromEl.offsetHeight / 2;
                    const x2 = toNode.pos_x;
                    const y2 = toNode.pos_y + toEl.offsetHeight   / 2;

                    const dist = pointToSegmentDist(dropX, dropY, x1, y1, x2, y2);

                    if (dist < bestDist) {
                        bestDist = dist;
                        bestConn = { fromId: fromIdStr, fromOutput: outputKey, toId: toIdStr, toInput: conn.input };
                    }
                });
            });
        });

        if (!bestConn) return;

        const { fromId, fromOutput, toId, toInput } = bestConn;

        // Vital: Pasamos explícitamente los Strings que extrajimos
        editor.removeSingleConnection(fromId, toId, fromOutput, toInput);
        editor.addConnection(fromId, newNodeIdStr, fromOutput, 'input_1');
        editor.addConnection(newNodeIdStr, toId, 'output_1', toInput);

        refreshPreview();
    }

    // Distancia de un punto (px, py) a un segmento (x1,y1)-(x2,y2)
    function pointToSegmentDist(px, py, x1, y1, x2, y2) {
        const dx = x2 - x1, dy = y2 - y1;
        const lenSq = dx * dx + dy * dy;
        if (lenSq === 0) return Math.hypot(px - x1, py - y1);
        const t = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / lenSq));
        return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
    }

    // Guarda el campo editado en characterData.
    // Cuando se escribe el ID por primera vez, lo pone readonly para evitar bugs.
    function onCharacterInput(inputEl, field) {
        const nodeEl = inputEl.closest('.drawflow-node');
        if (!nodeEl) return;

        const nodeId = parseInt(nodeEl.id.replace('node-', ''));
        if (!characterData[nodeId]) characterData[nodeId] = { id: '', name: '', color: '#ffffff', locked: false };

        characterData[nodeId][field] = inputEl.value;

        // Al salir del campo ID (o cuando tiene valor), lo bloqueamos
        if (field === 'id' && inputEl.value.trim()) {
            // Esperamos al blur para no molestar mientras escribe
            inputEl.addEventListener('blur', () => lockCharacterId(inputEl), { once: true });
        }

        if (field === 'color') {
            const header = nodeEl.querySelector('.char-header');
            if (header) {
                header.style.background = inputEl.value;
                header.style.color = getTextColor(inputEl.value);
            }
        }

        rebuildCharacters();
        refreshPreview();
    }

    // Hace el campo ID de solo lectura y muestra el botón de reset
    function lockCharacterId(idInput) {
        if (!idInput.value.trim()) return;
        idInput.readOnly = true;
        idInput.style.opacity = '0.6';
        idInput.title = 'El ID no se puede cambiar. Pulsa ✕ para resetearlo (perderás referencias).';
        const resetBtn = idInput.closest('div').querySelector('.lock-btn');
        if (resetBtn) resetBtn.style.display = 'block';

    // Permite resetear el ID con una advertencia clara
    function resetCharacterId(btn) {
        const confirmed = confirm(
            'Si cambias el ID, todos los nodos de Diálogo y Show que lo usen\n' +
            'perderán la referencia a este personaje.\n\n¿Continuar de todas formas?'
        );
        if (!confirmed) return;

        const nodeEl  = btn.closest('.drawflow-node');
        const nodeId  = parseInt(nodeEl.id.replace('node-', ''));
        const idInput = nodeEl.querySelector('[df-id]');

        idInput.readOnly    = false;
        idInput.style.opacity = '1';
        idInput.value       = '';
        idInput.title       = 'Identificador corto sin espacios.';
        btn.style.display   = 'none';

        if (characterData[nodeId]) characterData[nodeId].id = '';
        rebuildCharacters();
        refreshPreview();
    }

    // Minimizar / expandir el nodo de personaje
    function toggleCharacterMinimize(btn) {
        const nodeContainer = btn.closest('.node-container');
        const content       = nodeContainer.querySelector('.node-content');
        const miniLabel     = nodeContainer.querySelector('.char-mini-label');
        const nodeEl        = btn.closest('.drawflow-node');
        const nodeId        = parseInt(nodeEl.id.replace('node-', ''));

        const isCollapsed = content.classList.contains('collapsed');

        if (isCollapsed) {
            // Expandir
            content.classList.remove('collapsed');
            miniLabel.style.display = 'none';
            btn.textContent = '−';
            btn.title = 'Minimizar';
        } else {
            // Minimizar: mostramos el nombre del personaje en la etiqueta pequeña
            const data  = characterData[nodeId];
            const label = data?.name || data?.id || '— sin nombre —';
            miniLabel.textContent   = label;
            miniLabel.style.display = 'block';
            content.classList.add('collapsed');
            btn.textContent = '+';
            btn.title = 'Expandir';
        }
    }

    // ─────────────────────────────────────────────
    // NODO: MENÚ (decisiones)
    // ─────────────────────────────────────────────

    // El nodo menú tiene 1 entrada y N salidas (una por opción).
    // Cada salida se puede conectar a su propia cadena de nodos.
    // menuOptionCount rastrea cuántas opciones tiene cada nodo para poder nombrar
    // las salidas correctamente al añadir/quitar.
    const menuOptionCount = {};

    function addMenu(x = 300, y = 150) {
        // Empezamos con 2 opciones por defecto
        const initialOptions = 2;

        // Construimos el HTML de las opciones iniciales
        let optionsHtml = '';
        for (let i = 1; i <= initialOptions; i++) {
            optionsHtml += menuOptionRowHtml(i);
        }

        const html = `
            <div class="node-container">
                <div class="node-header menu-header">Menú</div>
                <div class="node-content">
                    Pregunta:
                    <input type="text" df-question placeholder="¿Qué quieres hacer?" oninput="refreshPreview()"
                        title="Texto que aparece antes de las opciones (opcional)">
                    <div style="font-size:11px;color:#888;margin:4px 0 2px">Opciones →</div>
                    <div class="menu-options-list">
                        ${optionsHtml}
                    </div>
                    <button class="menu-add-btn" onclick="menuAddOption(this)">+ Añadir opción</button>
                </div>
            </div>
        `;

        // N salidas = N opciones iniciales, 1 entrada
        const nodeId = editor.addNode('menu', 1, initialOptions, x, y, 'menu-node', {}, html);
        menuOptionCount[nodeId] = initialOptions;
        return nodeId;
    }

    // Genera el HTML de una fila de opción del menú
    function menuOptionRowHtml(index) {
        return `
            <div class="menu-option">
                <span class="menu-option-label">${index}.</span>
                <input type="text" placeholder="Opción ${index}..." oninput="refreshPreview()">
                <button class="menu-remove-btn" onclick="menuRemoveOption(this)" title="Quitar opción">×</button>
            </div>
        `;
    }

    // Añade una nueva opción al nodo menú y crea su salida correspondiente en Drawflow
    function menuAddOption(btn) {
        const nodeEl   = btn.closest('.drawflow-node');
        const nodeId   = parseInt(nodeEl.id.replace('node-', ''));
        const list     = nodeEl.querySelector('.menu-options-list');
        const newIndex = (menuOptionCount[nodeId] || 0) + 1;

        // Añadimos la fila visual
        list.insertAdjacentHTML('beforeend', menuOptionRowHtml(newIndex));
        menuOptionCount[nodeId] = newIndex;

        // Añadimos la salida en Drawflow para que aparezca el punto de conexión
        editor.addNodeOutput(nodeId);

        refreshPreview();
    }

    // Quita una opción del menú — solo si quedan más de 1
    function menuRemoveOption(btn) {
        const nodeEl = btn.closest('.drawflow-node');
        const nodeId = parseInt(nodeEl.id.replace('node-', ''));
        const list   = nodeEl.querySelector('.menu-options-list');
        const rows   = list.querySelectorAll('.menu-option');

        if (rows.length <= 1) return; // mínimo 1 opción

        btn.closest('.menu-option').remove();
        menuOptionCount[nodeId] = (menuOptionCount[nodeId] || 1) - 1;

        // Removemos la última salida de Drawflow
        editor.removeNodeOutput(nodeId, `output_${rows.length}`);

        // Renumeramos las etiquetas visualmente
        list.querySelectorAll('.menu-option-label').forEach((lbl, i) => {
            lbl.textContent = `${i + 1}.`;
        });

        refreshPreview();
    }

    // Genera el código Ren'Py para el nodo menú y sus ramas.
    // Soporta convergencia: si todas las ramas terminan en el mismo nodo,
    // ese nodo se genera DESPUÉS del bloque menu: (no dentro de cada rama).
    function menuBranchToScript(menuNodeId, nodes, indent, visited) {
        const nodeEl   = document.querySelector(`#node-${menuNodeId}`);
        const menuNode = nodes[menuNodeId];
        if (!nodeEl || !menuNode) return '';

        const rows = nodeEl.querySelectorAll('.menu-option');

        // Recopilamos los nodos de inicio de cada rama
        const branchStarts = [];
        rows.forEach((row, i) => {
            const outputKey   = `output_${i + 1}`;
            const connections = menuNode.outputs?.[outputKey]?.connections || [];
            branchStarts.push(connections.length > 0 ? Number(connections[0].node) : null);
        });

        // Detectamos el nodo de convergencia: el nodo al que llegan TODAS las ramas.
        // Recorremos cada rama hasta su fin y vemos si comparten el último nodo destino.
        const convergeId = findConvergenceNode(branchStarts, nodes);

        let script = `${indent}menu:\n`;

        // Si hay una pregunta, la añadimos como primera línea del bloque menu:
        // En Ren'Py esto muestra el texto al jugador antes de presentar las opciones
        const questionEl = nodeEl.querySelector('[df-question]');
        const question   = questionEl?.value?.trim();
        if (question) {
            script = `${indent}menu:\n${indent}    "${question}":\n${indent}        pass\n`;
            // Reescribimos correctamente: la pregunta va dentro del menu: como narración
            script = `${indent}menu "${question}":\n`;
        }

        rows.forEach((row, i) => {
            const label   = row.querySelector('input')?.value || `Opción ${i + 1}`;
            const startId = branchStarts[i];

            script += `${indent}    "${label}":\n`;

            if (startId !== null) {
                // Generamos la rama, deteniéndonos en el nodo de convergencia
                const branchVisited = new Set(visited);
                if (convergeId !== null) branchVisited.add(convergeId); // no entrar al nodo de convergencia
                const branchScript = chainToScript(startId, nodes, indent + '        ', branchVisited);
                script += branchScript || `${indent}        pass\n`;
            } else {
                script += `${indent}        pass\n`;
            }
        });

        // Si hay convergencia, continuamos desde ese nodo después del menu:
        if (convergeId !== null) {
            script += chainToScript(convergeId, nodes, indent, new Set(visited));
        }

        return script;
    }

    // Dado un array de nodos de inicio de ramas, encuentra el nodo donde convergen.
    // Estrategia: para cada rama, calculamos todos los nodos que visita.
    // El primer nodo que aparece en TODAS las ramas es el nodo de convergencia.
    function findConvergenceNode(branchStarts, nodes) {
        if (branchStarts.length === 0) return null;

        // Si alguna rama no tiene inicio, no puede haber convergencia total
        if (branchStarts.some(id => id === null)) return null;

        // Calculamos la cadena de IDs de cada rama (en orden)
        const branchChains = branchStarts.map(startId => {
            const chain   = [];
            const visited = new Set();
            let current   = startId;
            while (current && !visited.has(current) && chain.length < 200) {
                visited.add(current);
                chain.push(current);
                const node        = nodes[current];
                const firstOutput = Object.values(node?.outputs || {})[0];
                const conns       = firstOutput?.connections || [];
                current = conns.length > 0 ? Number(conns[0].node) : null;
                if (node?.name === 'menu') break; // no atravesamos sub-menús
            }
            // El "siguiente" al final de la cadena es el nodo donde converge
            if (current && !visited.has(current)) chain.push(current);
            return chain;
        });

        // Buscamos el primer nodo de la primera rama que también aparece en todas las demás
        for (const candidateId of branchChains[0]) {
            if (branchChains.every(chain => chain.includes(candidateId))) {
                // Nos aseguramos de que no sea el propio nodo de inicio de alguna rama
                if (!branchStarts.includes(candidateId)) {
                    return candidateId;
                }
            }
        }

        return null;
    }

    // Recorre la cadena de nodos a partir de startId generando código Ren'Py.
    // visited evita ciclos infinitos.
    function chainToScript(startId, nodes, indent = '    ', visited = new Set()) {
        let script  = '';
        let current = startId;

        while (current && !visited.has(current)) {
            visited.add(current);
            const node = nodes[current];
            if (!node) break;

            if (node.name === 'menu') {
                // El menú maneja su propia convergencia internamente
                script += menuBranchToScript(current, nodes, indent, new Set(visited));
                // menuBranchToScript ya continúa la cadena desde el nodo de convergencia
                break;
            } else {
                const lines = nodeToLines(current, nodes);
                script += lines.replace(/^    /gm, indent);
            }

            // Avanzamos al siguiente nodo
            const firstOutput = Object.values(node.outputs || {})[0];
            const conns       = firstOutput?.connections || [];
            current = conns.length > 0 ? Number(conns[0].node) : null;
        }

        return script;
    }


    // ─────────────────────────────────────────────
    // NODO: LABEL
    // ─────────────────────────────────────────────
    // Un Label es el punto de inicio de una cadena de nodos.
    // Solo tiene salida (0 entradas), igual que label start: en Ren'Py.
    // El generador busca todos los Labels del canvas y genera un bloque por cada uno.

    function addLabel(x = 100, y = 100) {
        const html = `
            <div class="node-container">
                <div class="node-header label-header">
                    <span>🏷 Label</span>
                </div>
                <div class="node-content">
                    Nombre:
                    <input type="text" df-labelname placeholder="start" oninput="refreshPreview()"
                        title="Nombre del label en Ren'Py. 'start' es el punto de entrada principal.">
                </div>
            </div>
        `;
        // Sin entradas, 1 salida — es siempre el inicio de una cadena
        return editor.addNode('label', 0, 1, x, y, 'label-node', { labelname: '' }, html);
    }


    // ─────────────────────────────────────────────
    // NODO: JUMP
    // ─────────────────────────────────────────────
    // Salta a otro label. Termina la cadena actual (no tiene salida).
    // El label destino puede ser cualquier Label del canvas u otro externo.

    function addJump(x = 300, y = 150) {
        // Construimos las opciones con los labels definidos en el canvas
        const labelOptions = buildLabelOptions();
        const html = `
            <div class="node-container">
                <div class="node-header jump-header">↪ Jump</div>
                <div class="node-content">
                    Destino:
                    <select df-target class="jump-target-selector" onchange="refreshPreview()">
                        <option value="">-- seleccionar --</option>
                        ${labelOptions}
                    </select>
                    <span style="font-size:10px;color:#888">o escribe un label externo:</span>
                    <input type="text" df-target_custom placeholder="nombre_label_externo" oninput="refreshPreview()">
                </div>
            </div>
        `;
        // 1 entrada, 0 salidas — termina la cadena
        return editor.addNode('jump', 1, 0, x, y, 'jump-node', { target: '', target_custom: '' }, html);
    }

    // Genera las opciones del selector de labels a partir de los nodos label del canvas
    function buildLabelOptions() {
        const nodes = editor.export().drawflow.Home.data;
        return Object.values(nodes)
            .filter(n => n.name === 'label')
            .map(n => {
                const nodeEl = document.querySelector(`#node-${n.id}`);
                const name   = nodeEl?.querySelector('[df-labelname]')?.value || n.data.labelname || '';
                return name ? `<option value="${name}">${name}</option>` : '';
            })
            .join('');
    }

    // Actualiza los selectores de jump cuando cambian los labels del canvas
    function rebuildJumpSelectors() {
        const labelOptions = buildLabelOptions();
        document.querySelectorAll('.jump-target-selector').forEach(sel => {
            const currentVal = sel.value;
            sel.innerHTML = `<option value="">-- seleccionar --</option>` + labelOptions;
            sel.value = currentVal;
        });
    }


    // ─────────────────────────────────────────────
    // NODO: VARIABLE
    // ─────────────────────────────────────────────
    // Ejecuta una operación sobre una variable Python: asignar, incrementar, etc.
    // Genera: $ nombre operador valor

    function addVariable(x = 300, y = 150) {
        const html = `
            <div class="node-container">
                <div class="node-header var-header">📦 Variable</div>
                <div class="node-content">
                    Variable:
                    <input type="text" df-varname placeholder="puntos" oninput="refreshPreview()"
                        title="Nombre de la variable Python">
                    Operación:
                    <select df-operator onchange="refreshPreview()">
                        <option value="=">=&nbsp;&nbsp; (asignar)</option>
                        <option value="+=">+= (sumar)</option>
                        <option value="-=">-= (restar)</option>
                        <option value="*=">*= (multiplicar)</option>
                        <option value="not ">not (invertir booleano)</option>
                    </select>
                    Valor:
                    <input type="text" df-varvalue placeholder="True / 1 / &quot;texto&quot;" oninput="refreshPreview()"
                        title="Valor a asignar. Usa comillas para strings, True/False para booleanos.">
                </div>
            </div>
        `;
        return editor.addNode('variable', 1, 1, x, y, 'var-node', { varname: '', operator: '=', varvalue: '' }, html);
    }


    // ─────────────────────────────────────────────
    // UNDO / REDO
    // ─────────────────────────────────────────────
    // Implementamos un historial manual de snapshots del estado completo del canvas.
    // Drawflow no tiene undo/redo nativo, así que guardamos el estado cada vez que
    // ocurre un cambio relevante y lo restauramos al hacer Ctrl+Z / Ctrl+Y.

    const undoStack = []; // estados pasados
    const redoStack = []; // estados futuros (se llenan al hacer undo)
    const MAX_HISTORY = 50;
    let isUndoRedoing = false; // flag para no guardar snapshot durante una restauración

    function captureSnapshot() {
        if (isUndoRedoing) return;
        const snapshot = {
            drawflow:       JSON.parse(JSON.stringify(editor.export())),
            characterData:  JSON.parse(JSON.stringify(characterData)),
            menuOptionCount: JSON.parse(JSON.stringify(menuOptionCount)),
        };
        undoStack.push(snapshot);
        if (undoStack.length > MAX_HISTORY) undoStack.shift(); // limitar memoria
        redoStack.length = 0; // cualquier cambio nuevo borra el redo
    }

    function applySnapshot(snapshot) {
        isUndoRedoing = true;

        // Restaurar datos extra
        Object.keys(characterData).forEach(k => delete characterData[k]);
        Object.keys(menuOptionCount).forEach(k => delete menuOptionCount[k]);
        Object.entries(snapshot.characterData).forEach(([k, v]) => { characterData[k] = v; });
        Object.entries(snapshot.menuOptionCount).forEach(([k, v]) => { menuOptionCount[k] = v; });

        // Restaurar el canvas
        editor.import(snapshot.drawflow);

        setTimeout(() => {
            rebuildCharacters();
            rebuildJumpSelectors();
            refreshPreview();
            saveSession();
            isUndoRedoing = false;
        }, 50);
    }

    function undo() {
        if (undoStack.length < 2) return; // necesitamos al menos estado actual + uno anterior
        const current = undoStack.pop();
        redoStack.push(current);
        applySnapshot(undoStack[undoStack.length - 1]);
    }

    function redo() {
        if (redoStack.length === 0) return;
        const next = redoStack.pop();
        undoStack.push(next);
        applySnapshot(next);
    }

    // Capturamos snapshot en cada evento relevante de Drawflow
    editor.on('nodeCreated',        () => captureSnapshot());
    editor.on('nodeRemoved',        () => captureSnapshot());
    editor.on('connectionCreated',  () => captureSnapshot());
    editor.on('connectionRemoved',  () => captureSnapshot());

    function getTextColor(hexColor) {
        const r = parseInt(hexColor.slice(1, 3), 16);
        const g = parseInt(hexColor.slice(3, 5), 16);
        const b = parseInt(hexColor.slice(5, 7), 16);
        const luminance = (r * 0.299 + g * 0.587 + b * 0.114) / 255;
        return luminance > 0.5 ? '#000000' : '#ffffff';
    }

    function updateDialogHeader(selector) {
        const header     = selector.closest('.node-container').querySelector('.dial-header');
        const selectedId = selector.value;

        if (selectedId === 'narrator') {
            header.style.background = '#3498db';
            header.style.color      = '#ffffff';
            return;
        }
        const character = characters.find(c => c.id === selectedId);
        if (!character) return;
        header.style.background = character.color;
        header.style.color      = getTextColor(character.color);
    }


    // ─────────────────────────────────────────────
    // SINCRONIZACIÓN DE PERSONAJES
    // ─────────────────────────────────────────────

    // Genera el HTML de opciones para los selectores de personaje
    function buildCharacterOptions() {
        return characters
            .map(c => `<option value="${c.id}">${c.name || c.id}</option>`)
            .join('');
    }

    // Reconstruye `characters` desde characterData y actualiza todos los selectores del canvas
    // Reconstruye `characters` desde characterData y actualiza todos los selectores del canvas
    function rebuildCharacters() {
        characters = Object.entries(characterData)
            .filter(([, d]) => d.id !== '')
            .map(([, d]) => ({ id: d.id, name: d.name, color: d.color }));

        // Selectores de Diálogo
        document.querySelectorAll('.char-selector').forEach(sel => {
            // Extraemos el valor real guardado en Drawflow
            const nodeId = sel.closest('.drawflow-node').id.replace('node-', '');
            const nodeData = editor.drawflow.drawflow.Home.data[nodeId]?.data || {};
            const savedVal = nodeData.char_id || 'narrator';

            sel.innerHTML = `<option value="narrator">Narrador</option>` + buildCharacterOptions();
            sel.value = savedVal; // Asignamos el valor después de crear las opciones
            updateDialogHeader(sel);
        });

        // Selectores de Show/Hide
        document.querySelectorAll('.show-char-selector').forEach(sel => {
            // Extraemos el valor real guardado en Drawflow
            const nodeId = sel.closest('.drawflow-node').id.replace('node-', '');
            const nodeData = editor.drawflow.drawflow.Home.data[nodeId]?.data || {};
            const savedVal = nodeData.char_id || '';

            sel.innerHTML = `<option value="">-- ninguno --</option>` + buildCharacterOptions();
            sel.value = savedVal; // Asignamos el valor después de crear las opciones
            updateShowHideCharHeader(sel);
        });

        // Actualizamos también los selectores de jump por si cambiaron los labels
        rebuildJumpSelectors();
    }


    // ─────────────────────────────────────────────
    // GENERACIÓN DEL SCRIPT .RPY
    // ─────────────────────────────────────────────

    // Lee un campo df-* del DOM del nodo (fresco, sin el retraso de Drawflow)
    // con fallback a los datos internos de Drawflow
    function val(nodeEl, node, dfAttr) {
        const key = dfAttr.replace('df-', '');
        if (nodeEl) {
            const el = nodeEl.querySelector(`[${dfAttr}]`);
            if (el) return el.type === 'checkbox' ? el.checked : (el.value ?? '');
        }
        return node?.data?.[key] ?? '';
    }

    // Convierte un nodo individual en líneas de código Ren'Py
    function nodeToLines(nodeId, nodes) {
        const node   = nodes[nodeId];
        if (!node) return '';
        const nodeEl = document.querySelector(`#node-${nodeId}`);
        const v      = (attr) => val(nodeEl, node, attr);

        if (node.name === 'scene') {
            let line = `    scene`;
            if (v('df-background')) line += ` ${v('df-background')}`;
            if (v('df-transition')) line += ` with ${v('df-transition')}`;
            return line + '\n';
        }
        if (node.name === 'showHide') {
            const charId = v('df-char_id');
            if (!charId) return '';
            const action = v('df-action') || 'show';
            if (action === 'show') {
                let line = `    show ${charId}`;
                if (v('df-sprite'))     line += ` ${v('df-sprite')}`;
                if (v('df-position'))   line += ` at ${v('df-position')}`;
                if (v('df-transition')) line += ` with ${v('df-transition')}`;
                return line + '\n';
            } else {
                let line = `    hide ${charId}`;
                if (v('df-transition')) line += ` with ${v('df-transition')}`;
                return line + '\n';
            }
        }
        if (node.name === 'playStop') {
            const action  = v('df-action') || 'play';
            const channel = v('df-channel') || 'music';
            if (action === 'stop') return `    stop ${channel}\n`;
            let line = `    ${action} ${channel} "${v('df-filepath')}"`;
            if (v('df-loop')) line += ` loop`;
            return line + '\n';
        }
        if (node.name === 'dialog') {
            const charId  = v('df-char_id') || 'narrator';
            const text    = v('df-text');
            const speaker = charId === 'narrator' ? '' : charId + ' ';
            return `    ${speaker}"${text}"\n`;
        }
        if (node.name === 'code') {
            const code = v('df-code');
            if (!code.trim()) return '';
            return code.split('\n').map(l => `    ${l}`).join('\n') + '\n';
        }
        if (node.name === 'jump') {
            // Prioriza el campo de texto libre sobre el selector
            const custom = v('df-target_custom').trim();
            const target = custom || v('df-target');
            if (!target) return '    # jump (sin destino)\n';
            return `    jump ${target}\n`;
        }
        if (node.name === 'variable') {
            const name     = v('df-varname').trim();
            const operator = v('df-operator') || '=';
            const value    = v('df-varvalue').trim();
            if (!name) return '';
            // El operador "not " es especial: $ var = not var
            if (operator === 'not ') return `    $ ${name} = not ${name}\n`;
            return `    $ ${name} ${operator} ${value}\n`;
        }
        return '';
    }

    // Genera el string completo del script .rpy
    // Si hay nodos Label en el canvas, cada uno genera su propio bloque label X:.
    // Si no hay Labels, busca el nodo raíz como antes (compatibilidad hacia atrás).
    function generateScript() {
        const nodes = editor.export().drawflow.Home.data;

        let defines = "# Personajes\n";
        let script  = "";

        Object.entries(characterData).forEach(([, data]) => {
            if (data.id) {
                defines += `define ${data.id} = Character("${data.name}", color="${data.color}")\n`;
            }
        });

        // Buscamos todos los nodos Label del canvas
        const labelIds = Object.keys(nodes)
            .map(Number)
            .filter(id => nodes[id].name === 'label');

        if (labelIds.length > 0) {
            // Modo multi-label: cada Label genera su propio bloque
            labelIds.forEach(labelId => {
                const nodeEl   = document.querySelector(`#node-${labelId}`);
                const labelName = nodeEl?.querySelector('[df-labelname]')?.value?.trim()
                    || nodes[labelId]?.data?.labelname
                    || 'sin_nombre';

                script += `\nlabel ${labelName}:\n`;

                // Seguimos la cadena desde la salida del Label
                const firstOutput = Object.values(nodes[labelId].outputs || {})[0];
                const conns       = firstOutput?.connections || [];
                if (conns.length > 0) {
                    script += chainToScript(Number(conns[0].node), nodes);
                } else {
                    script += "    pass\n";
                }

                script += "    return\n";
            });
        } else {
            // Modo legado: un solo label start: desde el nodo raíz
            script += "\nlabel start:\n";
            const rootId = findLegacyRootNode(nodes);
            if (rootId == null) {
                script += "    # (conecta los nodos para generar el guion)\n";
            } else {
                script += chainToScript(rootId, nodes);
            }
            script += "    return\n";
        }

        return defines + script;
    }

    // Busca el nodo raíz en modo legado (sin Labels): el nodo script sin entradas
    function findLegacyRootNode(nodes) {
        const scriptTypes = new Set(['scene','showHide','playStop','dialog','code','menu','jump','variable']);
        const allIds      = Object.keys(nodes).map(Number);
        const scriptIds   = allIds.filter(id => scriptTypes.has(nodes[id].name));

        const hasIncoming = new Set();
        scriptIds.forEach(id => {
            Object.values(nodes[id].outputs || {}).forEach(output => {
                (output.connections || []).forEach(conn => hasIncoming.add(Number(conn.node)));
            });
        });

        const roots = scriptIds.filter(id => !hasIncoming.has(id));
        return roots.length > 0 ? roots[0] : null;
    }


    // ─────────────────────────────────────────────
    // PREVISUALIZACIÓN
    // ─────────────────────────────────────────────

    function togglePreview() {
        const panel = document.getElementById('preview-panel');
        previewOpen = !previewOpen;
        panel.classList.toggle('open', previewOpen);
        if (previewOpen) refreshPreview();
    }

    // setTimeout(0) deja que el navegador procese el evento del input
    // antes de leer el DOM, eliminando el retraso de un carácter
    function refreshPreview() {
        if (!previewOpen) return;
        setTimeout(() => {
            document.getElementById('preview-code').value = generateScript();
        }, 0);
    }

    function copyPreview(btn) {
        const text = generateScript();
        // Intentamos la API moderna (requiere HTTPS o localhost)
        if (navigator.clipboard?.writeText) {
            navigator.clipboard.writeText(text)
                .then(() => flashCopyBtn(btn))
                .catch(() => fallbackCopy(text, btn));
        } else {
            fallbackCopy(text, btn);
        }
    }

    // Fallback para file:// — textarea temporal + execCommand
    function fallbackCopy(text, btn) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        try {
            document.execCommand('copy');
            flashCopyBtn(btn);
        } catch {
            alert('No se pudo copiar. Selecciona el texto en el panel manualmente.');
        }
        document.body.removeChild(ta);
    }

    function flashCopyBtn(btn) {
        const original = btn.textContent;
        btn.textContent = '✓ Copiado';
        setTimeout(() => btn.textContent = original, 1500);
    }


    // ─────────────────────────────────────────────
    // DESCARGAR
    // ─────────────────────────────────────────────

    function downloadRenPyScript() {
        const script = generateScript();
        const blob   = new Blob([script], { type: "text/plain" });
        const url    = URL.createObjectURL(blob);
        const link   = document.createElement("a");
        link.href     = url;
        link.download = "script.rpy";
        link.click();
        URL.revokeObjectURL(url);
    }


    // ─────────────────────────────────────────────
    // EXPORTAR / IMPORTAR CANVAS
    // ─────────────────────────────────────────────

    // Descarga el canvas completo como archivo .json que se puede importar después.
    // Incluye los datos de Drawflow + characterData + menuOptionCount.
    function exportCanvas() {
        const state = {
            version:        1,
            drawflow:       editor.export(),
            characterData:  characterData,
            menuOptionCount: menuOptionCount,
        };
        const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
        const url  = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href     = url;
        link.download = 'renpy-canvas.json';
        link.click();
        URL.revokeObjectURL(url);
    }

    // Carga un canvas desde un archivo .json exportado anteriormente.
    function importCanvas(ev) {
        const file = ev.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const state = JSON.parse(e.target.result);

                // Limpiamos el estado actual
                Object.keys(characterData).forEach(k => delete characterData[k]);
                Object.keys(menuOptionCount).forEach(k => delete menuOptionCount[k]);
                characters = [];

                // Restauramos los datos extra
                if (state.characterData) {
                    Object.entries(state.characterData).forEach(([k, v]) => { characterData[k] = v; });
                }
                if (state.menuOptionCount) {
                    Object.entries(state.menuOptionCount).forEach(([k, v]) => { menuOptionCount[k] = v; });
                }

                // Importamos el canvas en Drawflow
                editor.import(state.drawflow);

                // Esperamos a que el DOM renderice los nodos y luego reconstruimos
                setTimeout(() => {
                    rebuildCharacters();
                    saveSession();
                    refreshPreview();

                    // Restaurar colores de header y estado readonly de personajes
                    Object.entries(characterData).forEach(([nodeId, data]) => {
                        const nodeEl = document.querySelector(`#node-${nodeId}`);
                        if (!nodeEl) return;
                        const header = nodeEl.querySelector('.char-header');
                        if (header && data.color && data.color !== '#ffffff') {
                            header.style.background = data.color;
                            header.style.color = getTextColor(data.color);
                        }
                        const idInput = nodeEl.querySelector('[df-id]');
                        if (idInput && data.id) {
                            idInput.value    = data.id;
                            idInput.readOnly = true;
                            idInput.style.opacity = '0.6';
                            const resetBtn = idInput.closest('div')?.querySelector('.lock-btn');
                            if (resetBtn) resetBtn.style.display = 'block';
                        }
                        const nameInput  = nodeEl.querySelector('[df-name]');
                        const colorInput = nodeEl.querySelector('[df-color]');
                        if (nameInput)  nameInput.value  = data.name  || '';
                        if (colorInput) colorInput.value = data.color || '#ffffff';
                    });
                }, 100);

            } catch (err) {
                alert('El archivo no es un canvas válido.');
                console.error(err);
            }
        };
        reader.readAsText(file);

        // Limpiamos el input para que se pueda volver a cargar el mismo archivo
        ev.target.value = '';
    }


    // ─────────────────────────────────────────────
    // LIMPIAR CANVAS
    // ─────────────────────────────────────────────

    function clearCanvas() {
        if (!confirm('¿Limpiar el canvas? Se perderán todos los nodos.')) return;

        editor.clearModuleSelected();
        editor.import({ drawflow: { Home: { data: {} } } });

        Object.keys(characterData).forEach(k => delete characterData[k]);
        Object.keys(menuOptionCount).forEach(k => delete menuOptionCount[k]);
        characters = [];

        localStorage.removeItem('renpy_session');
        refreshPreview();
    }
</script>
</body>
